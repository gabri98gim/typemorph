<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMorph | Variable Font Lab</title>
    <meta name="description" content="Interactive Variable Font Explorer. Experiment with 35+ Google Variable Fonts in real time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="min-h-screen flex flex-col items-center">

    <header class="w-full max-w-7xl px-8 pt-10 pb-5 flex justify-between items-end border-b border-black/5">
        <div class="space-y-1">
            <h1 class="text-3xl font-serif tracking-tighter" style="font-family: 'Playfair Display', serif;">TypeMorph</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] font-medium opacity-40">Variable Font Explorer</p>
        </div>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-full border border-black/10 hover:bg-black hover:text-white transition-all dark:border-white/10 dark:hover:bg-white dark:hover:text-black" aria-label="Toggle dark mode">
                <!-- Sun icon (visible in dark mode) -->
                <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <!-- Moon icon (visible in light mode) -->
                <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <span class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-30">V 3.0</span>
        </div>
    </header>

    <main class="w-full max-w-7xl flex-1 flex flex-col lg:flex-row gap-10 p-8 mb-12">

        <!-- Canvas Section -->
        <section class="flex-1 flex flex-col gap-5">
            <!-- Font Selector -->
            <div id="font-selector-area" class="relative">
                <button id="font-selector-btn" class="w-full flex justify-between items-center paper-card px-6 py-4 hover:shadow-md transition-shadow cursor-pointer group">
                    <div class="text-left">
                        <p id="selected-font-name" class="text-lg font-bold tracking-tight">Roboto Flex</p>
                        <p id="selected-font-category" class="text-[10px] uppercase tracking-widest opacity-40">Sans Serif · 4 axes</p>
                    </div>
                    <svg class="w-4 h-4 opacity-30 group-hover:opacity-60 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>

                <!-- Dropdown -->
                <div id="font-dropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-black/10 rounded-2xl shadow-2xl z-50 overflow-hidden">
                    <div class="p-3 border-b border-black/5">
                        <input id="font-search"
                               type="text"
                               placeholder="Search fonts..."
                               class="w-full px-3 py-2 text-sm bg-black/0.03 rounded-lg outline-none focus:bg-black/0.06 transition-colors placeholder:opacity-30">
                    </div>
                    <p id="font-count" class="text-[9px] uppercase tracking-widest font-bold opacity-20 px-5 py-2 border-b border-black/5 bg-white">35 of 35</p>
                    <div id="font-list" class="max-h-[300px] overflow-y-auto p-2">
                        <!-- Font items injected here -->
                    </div>
                </div>
            </div>

            <!-- Text Canvas -->
            <div id="canvas-drop-zone" class="relative flex-1 paper-card p-12 flex items-center justify-center min-h-[450px] overflow-hidden">
                <div class="absolute inset-0 pointer-events-none border-20" style="border-color: var(--card-bg);"></div>
                <!-- Drop hint overlay -->
                <div id="drop-hint" class="absolute inset-0 z-20 flex items-center justify-center rounded-2xl" style="background: var(--card-bg); opacity: 0.95; display: none;">
                    <div class="text-center space-y-2">
                        <svg class="w-10 h-10 mx-auto opacity-30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <p class="text-xs font-black uppercase tracking-widest opacity-30">Drop font here</p>
                    </div>
                </div>
                <div id="target-text"
                     contenteditable="true"
                     spellcheck="false"
                     class="w-full text-center outline-none leading-[0.95] transition-opacity duration-150 ease-out wrap-break-word cursor-text"
                     style="font-family: 'Roboto Flex', sans-serif; font-size: 96px;">
                    Morph
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="flex gap-3">
                <button id="reset-btn" class="reset-btn px-5 py-2 text-[10px] uppercase tracking-widest font-bold rounded-full transition-all">Reset Axes</button>
                <label for="font-upload" class="reset-btn px-5 py-2 text-[10px] uppercase tracking-widest font-bold rounded-full transition-all cursor-pointer flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload Font
                </label>
                <input id="font-upload" type="file" accept=".otf,.ttf,.woff,.woff2" class="hidden">
            </div>
        </section>

        <!-- Controls Section -->
        <aside class="w-full lg:w-[380px] flex flex-col gap-10 pt-2">
            <div class="space-y-8">
                <!-- Display controls -->
                <div class="space-y-4">
                    <div class="space-y-2">
                        <h2 class="text-xs font-black uppercase tracking-[0.4em] opacity-30">Display</h2>
                        <div class="h-px w-full" style="background: var(--border-color);"></div>
                    </div>
                    <div class="group/slider space-y-3">
                        <div class="flex justify-between items-end">
                            <div class="space-y-0.5">
                                <label class="block text-[10px] font-black uppercase tracking-[0.2em] opacity-50 group-hover/slider:opacity-100 transition-opacity">Font Size</label>
                                <p class="text-[9px] font-mono opacity-20">px</p>
                            </div>
                            <span class="font-mono text-xs tabular-nums opacity-60" id="val-fontsize">96</span>
                        </div>
                        <input id="fontsize-slider" type="range" min="24" max="220" step="1" value="96" class="w-full">
                    </div>
                </div>

                <!-- Axis controls -->
                <div class="space-y-4">
                    <div class="space-y-2">
                        <h2 class="text-xs font-black uppercase tracking-[0.4em] opacity-30">Parameters</h2>
                        <div class="h-px w-full" style="background: var(--border-color);"></div>
                    </div>
                    <div class="space-y-8" id="controls-container">
                        <!-- Sliders injected here -->
                    </div>
                </div>
            </div>

            <!-- Code Export -->
            <div class="mt-auto group">
                <div class="mb-3 flex justify-between items-center">
                    <h2 class="text-xs font-black uppercase tracking-[0.4em] opacity-30">Export CSS</h2>
                    <button id="copy-btn" class="text-[9px] font-bold uppercase tracking-widest px-3 py-1 bg-black text-white rounded-md hover:scale-105 active:scale-95 transition-all">Copy</button>
                </div>
                <div class="code-block p-6 rounded-2xl font-mono text-[11px] leading-relaxed shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-linear-to-r from-blue-500 via-purple-500 to-pink-500 opacity-50"></div>
                    <code id="css-output" class="block whitespace-pre-wrap">font-variation-settings: 'wght' 400;</code>
                </div>
            </div>
        </aside>
    </main>

    <footer class="w-full p-6 border-t text-center space-y-3" style="border-color: var(--border-color);">
        <p class="text-[10px] uppercase tracking-[0.4em] font-medium opacity-20">No external libraries · 35+ Variable Fonts · Upload your own OTF · TTF · © 2026</p>
        <div class="flex justify-center gap-4">
            <a href="https://www.linkedin.com/in/gabriel-andreu-gimeno/" target="_blank" rel="noopener noreferrer" class="opacity-30 hover:opacity-80 transition-opacity" aria-label="LinkedIn">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            <a href="https://github.com/gabri98gim" target="_blank" rel="noopener noreferrer" class="opacity-30 hover:opacity-80 transition-opacity" aria-label="GitHub">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            </a>
        </div>
    </footer>

    <script type="module" src="./main.js"></script>
</body>
</html>
